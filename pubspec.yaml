name: ecoflowapp
description: EcoFlowApp — Módulo Campo · Monitoramento Ambiental
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  intl: ^0.19.0
  sqflite: ^2.3.3
  path: ^1.9.0
  # ── Backend integration ────────────────────────────────────────
  http: ^1.2.1                 # HTTP client for the REST API
  shared_preferences: ^2.2.3   # auth session + device_id persistence
  uuid: ^4.4.0                 # generate stable external_ids
  crypto: ^3.0.3               # SHA-256 for payload idempotency hash
  connectivity_plus: ^6.0.3    # online/offline detection for sync

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
